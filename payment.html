<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата заказа</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 40px 35px 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            text-align: center;
            max-width: 420px;
            width: 100%;
            transition: 0.3s;
        }
        .card .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .card h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 6px;
        }
        .card .sub {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .card .sum {
            font-size: 36px;
            font-weight: 700;
            color: #1a1a2e;
            margin: 16px 0 8px;
        }
        .card .sum small {
            font-size: 18px;
            font-weight: 400;
            color: #6b7280;
        }
        .card .status {
            display: inline-block;
            background: #d1fae5;
            color: #065f46;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin: 12px 0 16px;
        }
        .card .order-info {
            background: #f9fafb;
            border-radius: 10px;
            padding: 14px;
            margin: 16px 0 20px;
            font-size: 14px;
            color: #374151;
            text-align: left;
        }
        .card .order-info span {
            float: right;
            font-weight: 600;
        }
        .card .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px 0;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }
        .card .btn:hover { background: #1d4ed8; }
        .card .btn:active { transform: scale(0.97); }
        .card .btn.success {
            background: #16a34a;
            cursor: default;
        }
        .card .btn.success:hover { background: #16a34a; }
        .card .note {
            font-size: 12px;
            color: #9ca3af;
            margin-top: 20px;
        }
        .card .note strong { color: #6b7280; }
        .loader {
            display: none;
            border: 3px solid #f3f4f6;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card" id="paymentCard">
    <div class="logo">💳</div>
    <h1>Оплата заказа</h1>
    <div class="sub">Корпоративное кафе</div>

    <div class="sum" id="amount">1 250 <small>₽</small></div>
    <div class="status">✅ Платёж успешно обработан</div>

    <div class="order-info">
        📦 Заказ № <span id="orderId">#KFC-2025-001</span><br>
        👤 Получатель: <span id="customerName">Александр Московкин</span>
    </div>

    <button class="btn success" id="payBtn">✅ Оплачено</button>

    <div class="note">
        <strong>Тестовый режим</strong> • Сумма не списана
    </div>
</div>

<script>
    // ===== НАСТРОЙКИ (меняйте под себя) =====
    const orderData = {
        orderId: '#KFC-2025-001',
        customerName: 'Александр Московкин',
        amount: '1 250'
    };
    // ========================================

    document.getElementById('orderId').textContent = orderData.orderId;
    document.getElementById('customerName').textContent = orderData.customerName;
    document.getElementById('amount').innerHTML = orderData.amount + ' <small>₽</small>';
</script>

</body>
</html>
